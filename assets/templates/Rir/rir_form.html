{% extends "main/layout.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}
    <!-- Main content -->
    <section class="content">

      <div class="container-fluid">
        <div class="row">
        <div class="col-12">
            <div class="row">
                {% for d in dep_dummy %}
                    <div class="col-3">
                    <div class="card">
                        <div class="card-header bg-info text-white text-center"></div>
                    </div>
                </div>
                {% endfor %}
            </div>    
        </div>
          <div class="col-lg-12">
            <div class="card">
              <div class="card-body">
              {% csrf_token %}
              {% crispy form %}
              </div>
              <!-- /.card-body -->
            </div>
            <!-- /.card -->
          </div>
        </div>
      </div>
    </section>
    <!-- /.content -->
{% endblock %}
